name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: Lint & smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest nbformat

      - name: Lint with flake8
        run: |
          flake8 src/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503

      - name: Validate notebook format
        run: |
          python - <<'EOF'
          import nbformat, glob, sys
          errors = []
          for path in glob.glob("notebooks/*.ipynb"):
              try:
                  with open(path) as f:
                      nb = nbformat.read(f, as_version=4)
                  nbformat.validate(nb)
                  print(f"OK: {path}")
              except Exception as exc:
                  errors.append(f"{path}: {exc}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          EOF

      - name: Smoke-test extract_attention imports
        run: |
          cd src
          python - <<'EOF'
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location(
              "extract_attention", "extract_attention.py"
          )
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          assert hasattr(mod, "get_attention")
          assert hasattr(mod, "get_mean_attention_per_layer")
          assert hasattr(mod, "get_mean_attention_all_layers")
          print("extract_attention: OK")
          EOF
